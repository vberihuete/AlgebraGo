name: AlgebraGo
options:
  bundleIdPrefix: com.thesis.algebrago
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  developmentLanguage: es
  knownRegions:
    - es
    - en

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: AlgebraGo
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
    INFOPLIST_KEY_UIUserInterfaceStyle: Light

targets:
  AlgebraGo:
    type: application
    platform: iOS
    sources:
      - Sources
      - path: AlgebraGo-Icon.icon
        buildPhase: resources
    resources:
      - Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thesis.algebrago
        INFOPLIST_KEY_CFBundleDisplayName: AlgebraGo
        ASSETCATALOG_COMPILER_APPICON_NAME: AlgebraGo-Icon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
